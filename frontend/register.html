<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberCafe | Register</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <form id="registerForm" class="login-form">
            <h2>Create Account</h2>
            <p>Join the CyberCafe community</p>
            
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="regUsername" placeholder="JuanLuna123" required>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="student@cvsu.edu.ph" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="••••••••" required>
            </div>

            <button type="submit">Create Account</button>
            <p class="footer-text">Already have an account? <a href="index.html">Login here</a></p>
        </form>
    </div>
    <script src="register.js"></script>
</body>
</html>
